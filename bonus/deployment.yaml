apiVersion: apps/v1
kind: Deployment
metadata:
  name: playground-deployment # Juste le nom du déploiement 
  namespace: dev 
spec:
  replicas: 1
  selector:
    matchLabels:
      app: playground 
  template:
    metadata:
      labels:
        app: playground
    spec:
      containers:
      - name: playground-app
        image: nginx:alpine # Image officielle compatible ARM64 (Mac M1/M2/M3)
        ports:
        - containerPort: 80 # Nginx écoute par défaut sur le 80



